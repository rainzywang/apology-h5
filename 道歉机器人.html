<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>道歉解压小人 - 测试版</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        /* 头部 */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #ff6b6b;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        /* 解压小人 */
        .doll-container {
            text-align: center;
            margin: 40px 0;
        }

        .doll {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);border-radius: 50%;
            margin: 0 auto 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .doll:active {
            transform: scale(0.85);
            border-radius: 40% 60% 70% 30% / 50% 40% 60% 50%;
        }

        .face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
        }

        .hint {
            color: #888;
            font-size: 14px;
        }

        /* 摇晃动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }}

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* 消息框 */
        .message-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .message {
            font-size: 20px;
            color: #ff6b6b;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .msg-btn {
            background: #e9ecef;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor:pointer;
            font-size: 14px;
            color: #495057;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        .control-btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .squeeze-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .shake-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            box-shadow:0 4px 15px rgba(78, 205, 196, 0.4);
        }

        .reset-btn {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
            box-shadow: 0 4px 15px rgba(149, 165, 166, 0.4);
        }

        /* 页脚 */
        footer {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .doll {
                width: 150px;
                height: 150px;
            }
            
            .face {
                font-size: 50px;
            }
        }
    </style></head>
<body>
    <div class="container">
        <header>
            <h1>😔 道歉解压小人</h1>
            <p class="subtitle">测试版本 - 按住挤压，点击摇晃</p>
        </header>
        
        <main>
            <!-- 解压小人 -->
            <div class="doll-container">
                <div class="doll" id="apologyDoll">
                    <div class="face">😔</div>
                </div>
                <div class="hint">按住我挤压道歉</div>
            </div>
            
            <!-- 道歉文案 -->
            <div class="message-box">
                <div class="message" id="apologyMessage">对不起，我错了...</div>
                <div class="message-controls">
                    <button class="msg-btn" onclick="changeMessage(-1)">← 上一条</button>
                    <button class="msg-btn" onclick="changeMessage(1)">下一条→</button>
                </div>
            </div>
            
            <!-- 控制按钮 -->
            <div class="controls">
                <button class="control-btn squeeze-btn" onclick="squeezeDoll()">🤏 挤压道歉</button>
                <button class="control-btn shake-btn" onclick="shakeDoll()">🔄 摇晃道歉</button>
                <button class="control-btn reset-btn" onclick="resetDoll()">🔄 重置</button>
            </div>
            
            <!-- 状态提示 -->
            <div style="text-align:center;margin-top:20px;">
                <div style="display:inline-block;background:#667eea;color:white;padding:6px 16px;border-radius:20px;font-size:14px;">
                    测试版本 v1.0
                </div>
            </div>
        </main>
        
        <footer>
            <p>© 2024 道歉解压小人| GitHub Pages测试版</p>
            <p style="font-size:13px;margin-top:5px;">正式版将部署到 aixuchen.com</p>
        </footer>
    </div>
    
    <script>
        // 道歉文案库
        const apologyMessages = [
            "对不起，我错了...",
            "原谅我这一次好吗？",
            "我知道我让你伤心了",
            "给我一个改过的机会",
            "你对我真的很重要",
            "我会努力变得更好",
            "请接受我的歉意",
            "我保证不会再犯了",
            "你的笑容对我很重要",
            "让我们重新开始好吗？"
        ];
        
        let currentMessageIndex = 0;
        const doll = document.getElementById('apologyDoll');
        const messageEl = document.getElementById('apologyMessage');
        const face = doll.querySelector('.face');
        
        // 初始化
        updateMessage();
        
        // 挤压功能
        function squeezeDoll() {doll.style.transform = 'scale(0.8)';
            face.textContent = '😫';
            
            setTimeout(() => {
                doll.style.transform = 'scale(1)';
                face.textContent = '😊';
            }, 500);
        }
        
        // 摇晃功能
        function shakeDoll() {
            doll.classList.add('shake');
            face.textContent = '😵';
            
            setTimeout(() => {
                doll.classList.remove('shake');
                face.textContent = '😊';
            }, 500);
        }
        
        // 重置
        function resetDoll() {
            doll.style.transform = 'scale(1)';
            doll.classList.remove('shake');
            face.textContent = '😔';
            currentMessageIndex = 0;
            updateMessage();
        }// 切换文案
        function changeMessage(direction) {
            currentMessageIndex += direction;
            
            if (currentMessageIndex < 0) {
                currentMessageIndex = apologyMessages.length - 1;
            } else if (currentMessageIndex >= apologyMessages.length) {
                currentMessageIndex = 0;
            }
            
            updateMessage();
        }
        
        function updateMessage() {
            messageEl.textContent = apologyMessages[currentMessageIndex];
        }
        
        // 触摸事件
        doll.addEventListener('touchstart', (e) => {
            e.preventDefault();
            doll.style.transform = 'scale(0.85)';
            face.textContent = '😊';
        });
        
        doll.addEventListener('touchend', (e) => {e.preventDefault();
            doll.style.transform = 'scale(1)';
            setTimeout(() => { face.textContent = '😔'; }, 300);
        });
        
        // 鼠标事件
        doll.addEventListener('mousedown', () => {
            doll.style.transform = 'scale(0.85)';
            face.textContent = '😊';
        });
        
        doll.addEventListener('mouseup', () => {
            doll.style.transform = 'scale(1)';
            setTimeout(() => { face.textContent = '😔'; }, 300);
        });
        
        doll.addEventListener('mouseleave', () => {
            doll.style.transform = 'scale(1)';
            face.textContent = '😔';
        });
        
        // 自动切换文案（每5秒）
        setInterval(() => {
            currentMessageIndex = (currentMessageIndex + 1) % apologyMessages.length;updateMessage();
        }, 5000);
    </script>
</body>
</html>
