<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道歉解压小人 - 强制CSS修复</title>
    <style>
        /* 基础重置 - 确保无冲突 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #ff6b6b;
            margin-bottom: 10px;
        }
        
        /* 关键修复：挤压小人 - 使用ID选择器 + !important */
        #apologyDoll {
            width: 180px !important;
            height: 180px !important;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4) !important;
            border-radius: 50% !important;
            margin: 30px auto !important;
            display: block !important;
            position: relative !important;
            cursor: pointer !important;
            box-shadow: 0 10px 20px rgba(255,107,107,0.3) !important;
            border: none !important;
        }
        
        /* 表情 */
        #apologyDoll::before {
            content: "😔";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
        }
        
        /* 按钮样式 */
        button {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: #4ecdc4;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .squeeze-btn {
            background: #ff6b6b;
        }
        
        .shake-btn {
            background: #4ecdc4;
        }
        
        .reset-btn {background: #95a5a6;
        }
        
        .message {
            font-size: 20px;
            color: #ff6b6b;
            margin: 20px 0;
            min-height: 60px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😔 道歉解压小人</h1>
        <p>CSS强制修复版本</p>
        
        <!-- 关键：使用ID选择器 -->
        <div id="apologyDoll"></div>
        <p style="color:#888;font-size:14px;margin-top:10px;">按住挤压，点击按钮摇晃</p>
        
        <div class="message" id="apologyMessage">对不起，我错了...</div>
        
        <div>
            <button class="squeeze-btn" onclick="squeeze()">🤏 挤压道歉</button>
            <button class="shake-btn" onclick="shake()">🔄 摇晃道歉</button>
            <button class="reset-btn" onclick="reset()">🔄 重置</button></div>
        
        <div style="margin-top:30px;">
            <button onclick="prevMsg()">← 上一条</button>
            <button onclick="nextMsg()">下一条 →</button>
        </div>
        
        <p style="margin-top:40px;color:#888;font-size:14px;">
            如果看到粉色圆球，CSS修复成功
        </p>
    </div>
    
    <script>
        // 道歉文案
        const messages = [
            "对不起，我错了...",
            "原谅我这一次好吗？",
            "我知道我让你伤心了",
            "给我一个改过的机会",
            "你对我真的很重要",
            "我会努力变得更好",
            "请接受我的歉意",
            "我保证不会再犯了",
            "你的笑容对我很重要",
            "让我们重新开始好吗？"
        ];
        
        let currentMsgIndex = 0;
        const doll = document.getElementById('apologyDoll');
        const messageEl = document.getElementById('apologyMessage');// 初始化
        updateMessage();
        
        // 挤压功能
        function squeeze() {
            doll.style.transform = 'scale(0.8)';
            doll.style.borderRadius = '40% 60% 70% 30% / 50% 40% 60% 50%';
            doll.setAttribute('data-face', '😫');
            
            setTimeout(() => {
                doll.style.transform = 'scale(1)';
                doll.style.borderRadius = '50%';
                doll.setAttribute('data-face', '😊');
            }, 500);
        }
        
        // 摇晃功能
        function shake() {
            doll.style.animation = 'shake 0.5s ease-in-out';
            doll.setAttribute('data-face', '😵');
            
            setTimeout(() => {
                doll.style.animation = '';
                doll.setAttribute('data-face','😊');
            }, 500);
        }
        
        // 重置
        function reset() {
            doll.style.transform = 'scale(1)';
            doll.style.borderRadius = '50%';
            doll.style.animation = '';
            doll.setAttribute('data-face', '😔');
            currentMsgIndex = 0;
            updateMessage();
        }
        
        // 文案切换
        function prevMsg() {
            currentMsgIndex = (currentMsgIndex - 1 + messages.length) % messages.length;
            updateMessage();
        }
        
        function nextMsg() {
            currentMsgIndex = (currentMsgIndex + 1) % messages.length;
            updateMessage();
        }
        
        function updateMessage() {
            messageEl.textContent = messages[currentMsgIndex];
        }// 添加摇晃动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0) rotate(0deg); }
                25% { transform: translateX(-10px) rotate(-5deg); }
                75% { transform: translateX(10px) rotate(5deg); }
            }
            
            /* 动态更新表情 */
            #apologyDoll::before {
                content: attr(data-face, "😔");
            }
        `;
        document.head.appendChild(style);
        
        // 设置初始表情
        doll.setAttribute('data-face', '😔');
        
        // 触摸事件
        doll.addEventListener('touchstart', (e) => {
            e.preventDefault();
            doll.style.transform = 'scale(0.85)';
            doll.setAttribute('data-face','😊');
        });
        
        doll.addEventListener('touchend', (e) => {
            e.preventDefault();
            doll.style.transform = 'scale(1)';
            setTimeout(() => {
                doll.setAttribute('data-face', '😔');
            }, 300);
        });
        
        // 鼠标事件
        doll.addEventListener('mousedown', () => {
            doll.style.transform = 'scale(0.85)';
            doll.setAttribute('data-face', '😊');
        });
        
        doll.addEventListener('mouseup', () => {
            doll.style.transform = 'scale(1)';
            setTimeout(() => {
                doll.setAttribute('data-face', '😔');
            }, 300);
        });
    </script>
</body>
</html>
